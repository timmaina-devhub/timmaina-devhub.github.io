<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
  :root {
    --accent: #90caf9;
    --text: #e0e0e0;
    --bg: #0d1117;
    --card: #161b22;
    --nav: rgba(13,17,23,0.7);
  }

  body.light-mode {
    --accent: #2575fc;
    --text: #333;
    --bg: #ffffff;
    --card: #f5f5f5;
    --nav: rgba(255,255,255,0.8);
  }

  body {
    margin:0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: all 0.4s ease;
  }

  /* ---------- NAVBAR ---------- */
  .navbar {
    position: sticky;
    top:0;
    display:flex;
    justify-content: space-between;
    align-items:center;
    padding:15px 40px;
    backdrop-filter: blur(10px);
    background: var(--nav);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    z-index:100;
  }

  .logo {
    font-size:1.4em;
    font-weight:700;
    color: var(--text);
  }

  .nav-links a {
    margin-left:25px;
    text-decoration:none;
    color: var(--text);
    font-weight:500;
    position:relative;
  }

  .nav-links a::after {
    content:"";
    position:absolute;
    width:0%;
    height:2px;
    bottom:-5px;
    left:0;
    background: var(--accent);
    transition:0.3s;
  }

  .nav-links a:hover::after {
    width:100%;
  }

  #toggle {
    margin-left:20px;
    cursor:pointer;
    background: var(--card);
    border:none;
    padding:8px 12px;
    border-radius:8px;
    color: var(--text);
  }

  /* ---------- TITLE ---------- */
  .site-title {
    text-align:center;
    font-size:2.5em;
    margin:40px 0 20px;
  }

  .site-title::after {
    content:"";
    display:block;
    width:80px;
    height:4px;
    margin:10px auto;
    background: var(--accent);
    border-radius:2px;
    transition:0.4s;
  }

  /* ---------- CONTENT ---------- */
  .container {
    max-width:1100px;
    margin:auto;
    padding:20px;
  }

  .section {
    margin:60px 0;
    text-align:center;
  }

  .section h2 {
    font-size:2em;
    margin-bottom:20px;
  }

  .cards {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
    margin-top:30px;
  }

  .card {
    background: var(--card);
    padding:25px;
    border-radius:12px;
    transition:0.3s;
  }

  .card:hover {
    transform: translateY(-8px);
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
  }

  /* ---------- HERO ---------- */
  .hero {
    text-align:center;
    padding:80px 20px;
  }

  .hero h1 {
    font-size:3em;
    margin-bottom:10px;
  }

  .hero p {
    opacity:0.8;
  }
  /*Project page modifications*/
.projects-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 1.5rem;
}

.project-card {
  background: var(--card-bg);
  border-radius: 14px;
  overflow: hidden;
  transition: all 0.3s ease;
  text-decoration: none;
  color: inherit;
}

.project-card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.project-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.project-content {
  padding: 1rem;
}

.project-detail {
  margin-top: 4rem;
}

.project-hero {
  width: 100%;
  border-radius: 12px;
  margin-bottom: 1.5rem;
}

.project-links {
  margin-top: 1.5rem;
  display: flex;
  gap: 1rem;
}

.link-card img {
  border-radius: 10px;
  margin-bottom: 0.5rem;
}
  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">{{ site.title }}</div>
  <div class="nav-links">
    <a href="/index.html">Home</a>
    <a href="/about.html">About</a>
    <a href="/projects.html">Projects</a>
    <a href="/contact.html">Contact</a>
    <button id="toggle">☀️</button>
  </div>
</div>

<!-- PAGE CONTENT -->
<div class="container">
  {{ content }}
</div>

<script>
const toggle = document.getElementById("toggle");

toggle.onclick = () => {
  document.body.classList.toggle("light-mode");
  toggle.textContent =
    document.body.classList.contains("light-mode") ? "🌙" : "☀️";
};
</script>

</body>
</html>
